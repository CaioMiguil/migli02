<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="aqua-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="50%" stop-color="#00C2FF"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Fluid 'M' wave  -->
  <path
    d="M 12 78
       C 12 55, 22 28, 35 28
       C 44 28, 48 42, 50 56
       C 52 42, 56 28, 65 28
       C 78 28, 88 55, 88 78"
    stroke="url(#aqua-grad)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
  <!-- Water droplet accent -->
  <circle cx="50" cy="14" r="3.2" fill="url(#aqua-grad)" filter="url(#glow)"/>
  <!-- Subtle splash -->
  <circle cx="22" cy="22" r="1.1" fill="#7DD3FC" opacity="0.7"/>
  <circle cx="78" cy="20" r="0.9" fill="#7DD3FC" opacity="0.6"/>
  <circle cx="86" cy="36" r="0.7" fill="#7DD3FC" opacity="0.5"/>
</svg>
