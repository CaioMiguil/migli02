<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#04060C" />
    <meta name="color-scheme" content="dark" />

    <title>MIGLI — Escanear imóveis em 3D</title>
    <meta name="description" content="Escaneie qualquer imóvel com o celular e receba um tour 3D imersivo em minutos." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/brand/apple-touch-icon.png" />
    <link rel="mask-icon" href="/brand/migli-mark.svg" color="#00C2FF" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MIGLI" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="MIGLI" />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:title" content="MIGLI — Escanear imóveis em 3D" />
    <meta property="og:description" content="Escaneie qualquer imóvel com o celular e receba um tour 3D imersivo em minutos." />
    <meta property="og:image" content="/brand/icon-512.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
      html, body {
        background: #04060C;
        color: white;
        margin: 0;
        min-height: 100vh;
      }
      body {
        font-family: 'Montserrat', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      #pre-splash {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background:
          radial-gradient(ellipse 60% 50% at 50% 50%, rgba(0,194,255,0.16), transparent 70%),
          #04060C;
        z-index: 99999;
        transition: opacity .6s cubic-bezier(.16,1,.3,1);
      }
      #pre-splash.fade-out { opacity: 0; pointer-events: none; }
      #pre-splash svg { filter: drop-shadow(0 0 32px rgba(0,194,255,0.7)); }
      @keyframes mig-pulse { 0%,100% { opacity:.85; transform: scale(1); } 50% { opacity:1; transform: scale(1.07); } }
      #pre-splash .pulse { animation: mig-pulse 2s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <div id="pre-splash">
      <svg width="74" height="74" viewBox="0 0 100 100" fill="none" class="pulse" aria-hidden="true">
        <defs>
          <linearGradient id="pre-ocean" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#7DD3FC"/>
            <stop offset="50%" stop-color="#00C2FF"/>
            <stop offset="100%" stop-color="#0E8AC4"/>
          </linearGradient>
        </defs>
        <path d="M 12 78 C 12 55, 22 28, 35 28 C 44 28, 48 42, 50 56 C 52 42, 56 28, 65 28 C 78 28, 88 55, 88 78"
              stroke="url(#pre-ocean)" stroke-width="7" stroke-linecap="round" fill="none"/>
        <circle cx="50" cy="14" r="3.6" fill="url(#pre-ocean)"/>
      </svg>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
